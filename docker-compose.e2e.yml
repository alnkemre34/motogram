# Yerel E2E / contract testleri — CI ile ayni Postgres+Redis kimlik bilgileri
# (apps/api/test/jest-env.setup.ts varsayilan DATABASE_URL / REDIS_URL).
#
# Kullanim (repo kokunden):
#   docker compose -f docker-compose.e2e.yml up -d
#   cd apps/api && pnpm exec prisma migrate deploy
#   $env:E2E_TESTS='1'; pnpm run test:e2e
#
# Not: docker-compose.dev.yml farkli sifre ve veritabani adi kullanir; E2E icin bu dosya veya
# DATABASE_URL ortam degiskenini CI ile eslestirin.
# MinIO: apps/api jest-env ile ayni erisim anahtarlari (presigned upload E2E).

services:
  postgres:
    image: postgis/postgis:15-3.4
    container_name: motogram_postgres_e2e
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: motogram
      POSTGRES_PASSWORD: motogram_test_password
      POSTGRES_DB: motogram_test
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U motogram -d motogram_test"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: motogram_redis_e2e
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: motogram_minio_e2e
    ports:
      - "9000:9000"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
