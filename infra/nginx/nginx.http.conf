# Motogram Production Nginx - HTTP-Only Mode (Faz 7 Asama 1 gecici)
# TLS YOK. Sadece test/dev ortamlari icin.
# Prod'a gecince `nginx.prod.conf` (TLS'li) kullanilir.
#
# Port 80 uzerinde tek server:
#   - /v1/*          -> api:3000 (rate limit zones + auth/SOS siki limit)
#   - /socket.io/    -> api:3000 WebSocket upgrade
#   - /metrics       -> api:3000 (yalniz dahili ag)
#   - / (digeri)     -> web-admin:3100
#
# Docker ile kullanmak icin .env.prod'a ekle:
#   NGINX_CONF=nginx.http.conf
# (varsayilan nginx.prod.conf TLS'li dir.)

worker_processes auto;
worker_rlimit_nofile 65535;

events {
  worker_connections 8192;
  multi_accept on;
}

http {
  sendfile on;
  tcp_nopush on;
  tcp_nodelay on;
  keepalive_timeout 65;
  server_tokens off;

  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  log_format combined_upstream '$remote_addr - $remote_user [$time_local] '
                               '"$request" $status $body_bytes_sent '
                               '"$http_referer" "$http_user_agent" '
                               'rt=$request_time uct=$upstream_connect_time '
                               'uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log combined_upstream;
  error_log  /var/log/nginx/error.log warn;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

  # Rate limit zones (Spec 8.7.1)
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=30r/s;
  limit_req_zone $binary_remote_addr zone=api_auth:10m rate=5r/s;
  limit_req_zone $binary_remote_addr zone=api_sos:10m rate=1r/s;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
  }

  upstream motogram_api {
    server api:3000 max_fails=3 fail_timeout=30s;
    keepalive 32;
  }

  upstream motogram_admin {
    server web-admin:3100 max_fails=3 fail_timeout=30s;
    keepalive 16;
  }

  server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 25m;
    proxy_read_timeout 120s;
    proxy_send_timeout 120s;

    # /v1/auth/* siki rate limit (Spec 8.7.1)
    location ~ ^/v1/auth/(login|register|refresh) {
      limit_req zone=api_auth burst=10 nodelay;
      proxy_pass http://motogram_api;
      include /etc/nginx/proxy_common.conf;
    }

    # /v1/emergency/* SOS rate limit (Spec 4.4 + 8.7.1)
    location /v1/emergency/ {
      limit_req zone=api_sos burst=2 nodelay;
      proxy_pass http://motogram_api;
      include /etc/nginx/proxy_common.conf;
    }

    # WebSocket gateway (Spec 3.3 + 8.4)
    location /socket.io/ {
      proxy_pass http://motogram_api;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;
      proxy_read_timeout 3600s;
    }

    # /metrics endpoint'i sadece dahili ag icin (Spec 8.10.2)
    location /metrics {
      allow 172.16.0.0/12;
      allow 10.0.0.0/8;
      deny all;
      proxy_pass http://motogram_api;
      include /etc/nginx/proxy_common.conf;
    }

    # Genel /v1/* API istekleri
    location /v1/ {
      limit_req zone=api_general burst=60 nodelay;
      proxy_pass http://motogram_api;
      include /etc/nginx/proxy_common.conf;
    }

    # Admin panel (Next.js) - diger her istek
    location / {
      proxy_pass http://motogram_admin;
      include /etc/nginx/proxy_common.conf;
    }
  }
}
