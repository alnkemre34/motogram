# Repo ici ornek — `docker-compose.prod.yml` pgbackrest servisi bu dosyayi mount eder.
# Uretimde S3/MinIO repo1-s3-* ile degistirilebilir (pgBackRest dokumantasyonu).
# Postgres'te WAL arsivi: archive_mode=on ve archive_command (RUNBOOK §13.5).

[global]
repo1-path=/var/lib/pgbackrest/repo
repo1-retention-full=4
log-path=/var/lib/pgbackrest/log
start-fast=y
process-max=2

[motogram]
pg1-host=postgres
pg1-port=5432
pg1-path=/var/lib/postgresql/data
pg1-user=motogram
