# Motogram Prometheus - Spec 8.10
# API'den /v1/metrics endpoint'ini 15 saniyede bir scrape eder.
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: motogram-prod

rule_files:
  - /etc/prometheus/alerts.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

scrape_configs:
  - job_name: motogram-api
    metrics_path: /v1/metrics
    static_configs:
      - targets: ["api:3000"]
        labels:
          service: api
          environment: production

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
