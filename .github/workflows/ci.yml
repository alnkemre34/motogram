name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    name: Lint + Typecheck + Test
    runs-on: ubuntu-latest
    timeout-minutes: 25
    # Postgres/Redis: services: ile pull init aşamasında tek deneme + Docker Hub
    # zaman aşımı olabiliyor. Checkout sonrası pull (retry) + docker run kullanıyoruz.

    steps:
      - uses: actions/checkout@v4

      - name: Docker Hub login (isteğe bağlı; rate limit / pull güvenilirliği)
        env:
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          if [ -n "${DOCKERHUB_TOKEN:-}" ] && [ -n "${DOCKERHUB_USERNAME:-}" ]; then
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          else
            echo "Docker Hub secrets yok; anonim pull (retry adımı devam eder)."
          fi

      - name: Start Postgres & Redis (retry docker pull)
        run: |
          set -euo pipefail
          retry_pull() {
            local img="$1" n=1
            while [ "$n" -le 8 ]; do
              if docker pull "$img"; then return 0; fi
              echo "::warning::docker pull $img failed (attempt $n/8), retrying in 25s..." >&2
              sleep 25
              n=$((n+1))
            done
            return 1
          }
          docker rm -f postgres_ci redis_ci 2>/dev/null || true
          retry_pull postgis/postgis:15-3.4
          retry_pull redis:7-alpine
          docker run -d --name postgres_ci -p 5432:5432 \
            -e POSTGRES_USER=motogram \
            -e POSTGRES_PASSWORD=motogram_test_password \
            -e POSTGRES_DB=motogram_test \
            postgis/postgis:15-3.4
          docker run -d --name redis_ci -p 6379:6379 redis:7-alpine
          for i in $(seq 1 60); do
            if docker exec postgres_ci pg_isready -U motogram -d motogram_test >/dev/null 2>&1; then break; fi
            sleep 1
          done
          docker exec postgres_ci pg_isready -U motogram -d motogram_test
          for i in $(seq 1 30); do
            if docker exec redis_ci redis-cli ping 2>/dev/null | grep -q PONG; then break; fi
            sleep 1
          done
          docker exec redis_ci redis-cli ping | grep -q PONG

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.20.0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start MinIO (S3 API for media E2E)
        run: |
          set -euo pipefail
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data --console-address ":9001"
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:9000/minio/health/ready" >/dev/null 2>&1; then
              echo "MinIO is ready on :9000"
              exit 0
            fi
            if curl -fsS "http://127.0.0.1:9000/minio/health/live" >/dev/null 2>&1; then
              echo "MinIO is up on :9000 (liveness)"
              exit 0
            fi
            sleep 1
          done
          echo "MinIO did not become ready" >&2
          docker logs minio 2>&1 | tail -n 200 || true
          exit 1

      - name: Security audit (high+)
        run: pnpm audit --audit-level=high

      - name: Build shared package
        run: pnpm --filter @motogram/shared build

      - name: Generate Prisma client
        working-directory: apps/api
        run: pnpm exec prisma generate

      - name: Prisma migrate deploy (test DB)
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://motogram:motogram_test_password@localhost:5432/motogram_test?schema=public
        run: pnpm exec prisma migrate deploy

      - name: Prisma seed (gamification + test RBAC users)
        working-directory: apps/api
        env:
          DATABASE_URL: postgres://motogram:motogram_test_password@localhost:5432/motogram_test?schema=public
        run: pnpm run db:seed && pnpm run db:seed:test-users

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: OpenAPI contract check (drift gate)
        run: pnpm openapi:check

      - name: Test (API unit)
        run: pnpm --filter @motogram/api test
        env:
          NODE_ENV: test
          DATABASE_URL: postgres://motogram:motogram_test_password@localhost:5432/motogram_test?schema=public
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_SECRET: test_access_secret_minimum_32_chars_long_ok
          JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_chars_long_ok
          SERVER_HOSTNAME: api-test-local
          INTERNAL_API_SHARED_SECRET: internal_shared_secret_minimum_32_chars_ok
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: motogram-media
          MINIO_USE_SSL: "false"

      - name: Test (API contract)
        run: pnpm --filter @motogram/api run test:contract
        env:
          CONTRACT_TESTS: '1'
          NODE_ENV: test
          DATABASE_URL: postgres://motogram:motogram_test_password@localhost:5432/motogram_test?schema=public
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_SECRET: test_access_secret_minimum_32_chars_long_ok
          JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_chars_long_ok
          SERVER_HOSTNAME: api-test-local
          INTERNAL_API_SHARED_SECRET: internal_shared_secret_minimum_32_chars_ok
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: motogram-media
          MINIO_USE_SSL: "false"

      - name: Test (API edge-to-edge E2E)
        run: pnpm --filter @motogram/api run test:e2e
        env:
          E2E_TESTS: '1'
          NODE_ENV: test
          DATABASE_URL: postgres://motogram:motogram_test_password@localhost:5432/motogram_test?schema=public
          REDIS_URL: redis://localhost:6379/0
          JWT_ACCESS_SECRET: test_access_secret_minimum_32_chars_long_ok
          JWT_REFRESH_SECRET: test_refresh_secret_minimum_32_chars_long_ok
          SERVER_HOSTNAME: api-test-local
          INTERNAL_API_SHARED_SECRET: internal_shared_secret_minimum_32_chars_ok
          CORS_ALLOWED_ORIGINS: http://localhost:3000
          MINIO_ENDPOINT: localhost
          MINIO_PORT: "9000"
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
          MINIO_BUCKET: motogram-media
          MINIO_USE_SSL: "false"

      - name: Test (shared + web-admin)
        run: pnpm --filter @motogram/shared test && pnpm --filter @motogram/web-admin test
